    <!-- Video Modal -->
    <div id="video-modal" class="modal hidden">
        <div class="modal-content">
            <button id="modal-close" class="modal-close">&times;</button>
            <div class="modal-body">
                <div id="video-container" class="video-container">
                    <video id="video-player" controls autoplay loop>
                        <source id="video-source" src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div id="image-container" class="image-container hidden">
                    <p>Image posts are downloaded as ZIP files. Check the download below.</p>
                </div>
                <div class="video-info">
                    <div class="modal-title-row">
                        <h2 id="modal-title"></h2>
                        <a id="modal-tiktok-link" href="#" target="_blank" class="tiktok-link">View on TikTok ↗</a>
                    </div>
                    <p id="modal-creator"></p>
                    <p id="modal-date"></p>
                    <div id="modal-tags-section" class="modal-tags-section">
                        <div class="modal-tags-header">
                            <h4>Tags</h4>
                            <button class="modal-add-tag-btn" id="modal-add-tag-btn">+</button>
                            <div id="modal-tag-input-container" class="modal-tag-input-container hidden">
                                <input type="text" id="modal-tag-input" class="modal-tag-input" placeholder="Add tags (comma separated)">
                            </div>
                        </div>
                        <div id="modal-tags-list"></div>
                    </div>
                    <div class="description-section">
                        <h4>Description</h4>
                        <p id="modal-description"></p>
                    </div>
                    <div id="transcription-section" class="transcription-section hidden">
                        <div class="section-header">
                            <h3>Transcription</h3>
                            <button class="copy-btn" id="copy-transcription" title="Copy to clipboard">📋</button>
                        </div>
                        <p id="modal-transcription"></p>
                    </div>
                    <div id="ocr-section" class="ocr-section hidden">
                        <div class="section-header">
                            <h3>OCR Text</h3>
                            <button class="copy-btn" id="copy-ocr" title="Copy to clipboard">📋</button>
                        </div>
                        <p id="modal-ocr"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
