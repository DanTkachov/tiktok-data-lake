                                    <input type="checkbox" id="filter-videos" checked>
                                    <span>Videos</span>

                                <label class="filter-label">
                                    <input type="checkbox" id="filter-images" checked>
                                    <span>Image Posts</span>

                                    <input type="radio" name="transcription-status" id="filter-transcription-all" value="all" checked>
                                    <span>Both</span>
                                </label>
                            </div>

                        <div class="filter-block" id="ocr-filter-block">
                            <div class="filter-header">OCR</div>
                            <div class="filter-options">
