    <!-- Settings Panel -->
    <div id="settings-modal" class="settings-panel hidden">
        <div class="settings-modal-content">
            <button id="settings-modal-close" class="modal-close">&times;</button>
            <div class="settings-modal-body">
                <h2>Settings</h2>
                <div class="settings-section">
                    <h3>Grid Layout</h3>
                    <div class="settings-slider-group">
                        <label class="settings-slider-label">
                            <span>Columns: <strong id="columns-value">5</strong></span>
                            <input type="range" id="columns-slider" min="5" max="10" value="5" class="settings-slider">
                        </label>
                        <label class="settings-slider-label">
                            <span>Rows: <strong id="rows-value">5</strong></span>
                            <input type="range" id="rows-slider" min="3" max="10" value="5" class="settings-slider">
                        </label>
                        <p class="settings-hint">Videos per page: <span id="videos-per-page">25</span></p>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Modal Layout</h3>
                    <div class="filter-options">
                        <label class="filter-radio-label">
                            <input type="radio" name="modal-layout" id="modal-layout-vertical" value="vertical" checked>
                            <span>Vertical (stacked)</span>
                        </label>
                        <label class="filter-radio-label">
                            <input type="radio" name="modal-layout" id="modal-layout-horizontal" value="horizontal">
                            <span>Horizontal (side by side)</span>
                        </label>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Tag Mode</h3>
                    <div class="filter-options">
                        <label class="filter-radio-label">
                            <input type="radio" name="tag-mode" id="tag-mode-and" value="and" checked>
                            <span>AND (all tags)</span>
                        </label>
                        <label class="filter-radio-label">
                            <input type="radio" name="tag-mode" id="tag-mode-or" value="or">
                            <span>OR (any tag)</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
